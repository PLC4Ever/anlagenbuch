<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anlagen Admin</title>
    <style>
      :root {
        --bg-0: #e9f5f2;
        --bg-1: #d2e6df;
        --ink: #0f2e2e;
        --ink-2: #2f4f4f;
        --line: #bdd1ca;
        --panel: #ffffff;
        --brand: #0f766e;
        --brand-2: #145d55;
        --warn: #a16207;
        --danger: #9f1239;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1400px 800px at 0% -10%, #f4fcfa 0%, transparent 60%),
          linear-gradient(135deg, var(--bg-0), var(--bg-1));
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 18px;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 16px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 12px 30px rgba(15, 46, 46, 0.08);
      }

      .sidebar h1 {
        margin: 0 0 8px 0;
        font-size: 1.2rem;
      }

      .sidebar p {
        margin: 0 0 12px 0;
        color: var(--ink-2);
        font-size: 0.92rem;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        width: 100%;
      }

      .nav-btn {
        text-align: left;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f4faf8;
        color: var(--ink);
        padding: 9px 10px;
        font-size: 0.95rem;
      }

      .nav-btn.active {
        background: linear-gradient(110deg, var(--brand), var(--brand-2));
        color: white;
        border-color: transparent;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .header h2 {
        margin: 0;
        font-size: 1.18rem;
      }

      .sub {
        margin: 0;
        color: var(--ink-2);
        font-size: 0.92rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .cols-2 {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      }

      .cols-3 {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      input,
      textarea,
      select,
      button {
        font: inherit;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px;
        background: #f8fcfa;
        color: var(--ink);
      }

      textarea {
        min-height: 84px;
        resize: vertical;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 9px 12px;
        background: var(--brand);
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: #3b5c5d;
      }

      button.warn {
        background: var(--warn);
      }

      button.danger {
        background: var(--danger);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 9px;
        font-size: 0.78rem;
        border: 1px solid var(--line);
        background: #f3faf8;
      }

      .muted {
        color: var(--ink-2);
      }

      .ok {
        color: #166534;
      }

      .warn-text {
        color: var(--warn);
      }

      .error {
        color: var(--danger);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 8px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f4fbf8;
        padding: 10px;
      }

      .stat .k {
        font-size: 0.77rem;
        text-transform: uppercase;
        color: var(--ink-2);
        margin-bottom: 3px;
      }

      .stat .v {
        font-size: 1.2rem;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 7px 8px;
        text-align: left;
        vertical-align: top;
        font-size: 0.89rem;
      }

      th {
        background: #eef8f4;
        font-weight: 600;
      }

      pre {
        border: 1px solid #1f3d3f;
        background: #0f2325;
        color: #d7f7f1;
        border-radius: 10px;
        padding: 10px;
        margin: 0;
        max-height: 320px;
        overflow: auto;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field label {
        font-size: 0.84rem;
        color: var(--ink-2);
      }

      .login {
        max-width: 460px;
        margin: 50px auto;
      }

      a.inline-link {
        color: var(--brand-2);
      }

      .dispatcher-page {
        display: block;
      }

      .dispatcher-shell {
        display: grid;
        gap: 14px;
        grid-template-columns: 270px minmax(0, 1fr);
        align-items: start;
      }

      .dispatcher-sidebar {
        position: sticky;
        top: 14px;
        background:
          radial-gradient(560px 220px at -10% -10%, #f4fcfa 0%, transparent 72%),
          #ffffff;
      }

      .dispatcher-sidebar h2 {
        margin: 0 0 4px 0;
      }

      .dispatcher-sidebar p {
        margin-top: 0;
      }

      .dispatcher-nav {
        gap: 8px;
      }

      .dispatcher-sidebar-actions {
        margin-top: 2px;
      }

      .dispatcher-sidebar-actions button {
        width: 100%;
      }

      .dispatcher-nav-btn {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f4faf8;
        color: var(--ink);
        text-align: left;
        padding: 10px 12px;
      }

      .dispatcher-nav-btn.active {
        background: linear-gradient(108deg, var(--brand), var(--brand-2));
        color: #ffffff;
        border-color: transparent;
        box-shadow: 0 10px 22px rgba(15, 118, 110, 0.26);
      }

      .dispatcher-main {
        min-width: 0;
      }

      .dispatcher-hero {
        background:
          radial-gradient(900px 220px at 0% -30%, #f4fbff 0%, transparent 75%),
          linear-gradient(120deg, #f0f8f6, #f8fcfa);
      }

      .dispatcher-steps {
        display: grid;
        gap: 10px;
        margin-top: 10px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .step-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: white;
        padding: 12px;
      }

      .step-card h3 {
        margin: 2px 0 6px 0;
        font-size: 1rem;
      }

      .step-card p {
        margin: 0;
        color: var(--ink-2);
        font-size: 0.9rem;
      }

      .step-no {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: white;
        background: linear-gradient(120deg, var(--brand), var(--brand-2));
      }

      .dispatcher-filters {
        display: grid;
        gap: 10px;
        margin-top: 12px;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      }

      .dispatcher-stats .stat {
        border-left: 5px solid transparent;
      }

      .stat-open {
        border-left-color: #0f766e;
      }

      .stat-new {
        border-left-color: #0ea5e9;
      }

      .stat-work {
        border-left-color: #f59e0b;
      }

      .stat-closed {
        border-left-color: #6b7280;
      }

      .dispatcher-ticket-list {
        display: grid;
        gap: 10px;
      }

      .dispatcher-ticket-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fbfefc;
        padding: 12px;
      }

      .dispatcher-ticket-card h3 {
        margin: 0;
        font-size: 1.02rem;
      }

      .dispatcher-ticket-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 8px;
      }

      .dispatcher-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .dispatcher-focus {
        background: #f7fbf9;
      }

      .dispatcher-action-card {
        background: #fbfefc;
      }

      .dispatcher-action-card.is-ready {
        border-color: #86efac;
        background: #f0fdf4;
      }

      .dispatcher-action-card.is-disabled {
        border-color: #cbd5e1;
        background: #f8fafc;
      }

      .dispatcher-fieldset {
        border: 0;
        margin: 0;
        padding: 0;
        min-width: 0;
      }

      .dispatcher-fieldset[disabled] {
        opacity: 0.72;
      }

      .dispatcher-feedback {
        margin: 10px 0 12px;
        border-radius: 10px;
        border: 1px solid;
        padding: 10px 12px;
        font-size: 0.93rem;
      }

      .dispatcher-feedback.success {
        background: #ecfdf5;
        border-color: #86efac;
        color: #166534;
      }

      .dispatcher-feedback.error {
        background: #fef2f2;
        border-color: #fca5a5;
        color: #991b1b;
      }

      .dispatcher-feedback.info {
        background: #eff6ff;
        border-color: #93c5fd;
        color: #1d4ed8;
      }

      .dispatcher-state {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 0.78rem;
        border: 1px solid;
      }

      .dispatcher-state.done {
        background: #dcfce7;
        border-color: #86efac;
        color: #166534;
      }

      .dispatcher-state.wait {
        background: #fff7ed;
        border-color: #fdba74;
        color: #9a3412;
      }

      .dispatcher-events {
        display: grid;
        gap: 8px;
      }

      .dispatcher-event {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f4faf8;
        padding: 10px;
      }

      .auto-report-builder {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #f7fcfa;
        padding: 12px;
      }

      .dispatcher-schedule-list {
        margin-top: 10px;
      }

      .dispatcher-schedule-card.enabled {
        border-left: 6px solid #16a34a;
        background: #f0fdf4;
      }

      .dispatcher-schedule-card.disabled {
        border-left: 6px solid #64748b;
        background: #f8fafc;
      }

      .dispatcher-schedule-state {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 0.78rem;
        border: 1px solid;
      }

      .dispatcher-schedule-state.enabled {
        background: #dcfce7;
        border-color: #86efac;
        color: #166534;
      }

      .dispatcher-schedule-state.disabled {
        background: #e2e8f0;
        border-color: #cbd5e1;
        color: #334155;
      }

      .dispatcher-event .header {
        margin-bottom: 6px;
      }

      .format-chip {
        border: 1px solid #8db7b5;
        background: #eaf6f3;
        color: #0f3636;
      }

      .format-chip.active {
        background: #0f766e;
        border-color: #0f766e;
        color: #ffffff;
      }

      .dispatcher-source summary {
        cursor: pointer;
        font-weight: 600;
        color: var(--brand-2);
      }

      .d-modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(15, 46, 46, 0.45);
        display: grid;
        place-items: center;
        padding: 18px;
        z-index: 50;
      }

      .d-modal {
        width: min(980px, 100%);
        max-height: 92vh;
        overflow: auto;
        background: white;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 26px 60px rgba(15, 46, 46, 0.28);
      }

      .help-modal {
        width: min(1040px, 100%);
      }

      .help-grid {
        display: grid;
        gap: 10px;
      }

      .help-topic {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f7fcfa;
        padding: 10px;
      }

      .help-topic h3 {
        margin: 0 0 6px 0;
        font-size: 1rem;
      }

      .help-topic ul {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 5px;
      }

      .image-lightbox-bg {
        position: fixed;
        inset: 0;
        background: rgba(5, 20, 22, 0.72);
        display: grid;
        place-items: center;
        padding: 18px;
        z-index: 70;
      }

      .image-lightbox {
        width: min(980px, 100%);
        max-height: 92vh;
        overflow: auto;
        border-radius: 14px;
        border: 1px solid #1d4040;
        background: #0d2223;
        color: #d8f5ef;
        padding: 12px;
        box-shadow: 0 24px 58px rgba(0, 0, 0, 0.45);
      }

      .image-lightbox h3 {
        margin: 0;
      }

      .image-lightbox img {
        width: 100%;
        height: auto;
        max-height: 72vh;
        object-fit: contain;
        border-radius: 10px;
        border: 1px solid #2b5b5d;
        background: #071516;
      }

      .badge.d-new {
        background: #e0f2fe;
        border-color: #7dd3fc;
        color: #075985;
      }

      .badge.d-work {
        background: #fef3c7;
        border-color: #fcd34d;
        color: #92400e;
      }

      .badge.d-resolved {
        background: #dcfce7;
        border-color: #86efac;
        color: #166534;
      }

      .badge.d-closed {
        background: #e5e7eb;
        border-color: #cbd5e1;
        color: #334155;
      }

      @media (max-width: 980px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }

        .dispatcher-shell {
          grid-template-columns: 1fr;
        }

        .dispatcher-sidebar {
          position: static;
        }

        .dispatcher-nav {
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .dispatcher-sidebar-actions {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .d-modal-bg {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
