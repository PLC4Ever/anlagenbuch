<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tickets</title>
    <style>
      body { font-family: "IBM Plex Sans", sans-serif; margin: 0; background: radial-gradient(circle at top left,#fff4e8,#f3f8ff); color:#241d17; }
      .container { max-width: 900px; margin: 0 auto; padding: 22px; }
      .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 10px 24px rgba(0,0,0,0.08); }
      input, textarea, button { font: inherit; }
      input, textarea { width: 100%; padding: 10px; border: 1px solid #d8d0c5; border-radius: 8px; margin-bottom: 8px; }
      button { padding: 10px 14px; border: none; border-radius: 8px; background: #1e5ea8; color: white; }
      button.secondary { background: #3c5874; margin-top: 8px; }
      .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 6px; }
      .upload-preview { margin-top: 10px; border: 1px solid #d8d0c5; border-radius: 10px; background: #f9f6f1; padding: 10px; }
      .pending-list { margin-top: 10px; border: 1px dashed #d8d0c5; border-radius: 8px; background: #fcfaf5; padding: 8px; }
      .pending-item { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-top: 6px; }
      .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-top: 10px; }
      .stat-card { border: 1px solid #d8d0c5; border-radius: 10px; background: #f6f9ff; padding: 10px; display: grid; gap: 4px; }
      .stat-card span { font-size: 0.9rem; color: #3a4f67; }
      .stat-card strong { font-size: 1.3rem; }
      .dashboard-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .dashboard-filters input { flex: 1 1 320px; margin-bottom: 0; }
      .dashboard-filters select { padding: 10px; border: 1px solid #d8d0c5; border-radius: 8px; min-width: 180px; }
      .ticket-list { display: grid; gap: 8px; margin-top: 8px; }
      .ticket-row { text-align: left; background: #eef5ff; color: #15304d; border: 1px solid #bfd2ea; border-radius: 10px; padding: 10px; }
      .ticket-row.active { background: #d9e8fb; border-color: #7ea3ce; box-shadow: inset 0 0 0 1px #7ea3ce; }
      .ticket-row-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .status-pill { display: inline-block; font-size: 0.82rem; padding: 4px 8px; border-radius: 999px; border: 1px solid transparent; }
      .s-new { background: #fff3cd; color: #7a5f00; border-color: #f0d88c; }
      .s-work { background: #dbeafe; color: #1e3a8a; border-color: #9cc2fa; }
      .s-resolved { background: #dcfce7; color: #14532d; border-color: #9ee2b2; }
      .s-closed { background: #eef2f7; color: #334155; border-color: #c7d2e2; }
      .preview-image, .annotate-canvas { width: 100%; max-width: 100%; border: 1px solid #d8d0c5; border-radius: 8px; background: #fff; display: block; }
      .annotate-canvas { touch-action: none; cursor: crosshair; }
      .modal-backdrop { position: fixed; inset: 0; background: rgba(16, 24, 40, 0.56); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 1000; }
      .modal-card { width: min(780px, 100%); max-height: 88vh; overflow: auto; background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 22px 45px rgba(0,0,0,0.28); }
      .modal-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .modal-hero { display: flex; justify-content: space-between; gap: 8px; align-items: center; flex-wrap: wrap; border: 1px solid #d8d0c5; border-radius: 10px; background: #f8fafc; padding: 10px; margin-top: 8px; }
      .stepper { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 10px 0; }
      .step { border-radius: 8px; border: 1px solid #d0d8e5; background: #f5f7fb; padding: 8px; text-align: center; font-size: 0.78rem; }
      .step.done { background: #dbeafe; border-color: #93c5fd; }
      .step.active { background: #dcfce7; border-color: #86efac; }
      .timeline-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
      .timeline-list li { display: flex; gap: 8px; align-items: flex-start; }
      .timeline-list .dot { width: 10px; height: 10px; margin-top: 6px; border-radius: 50%; background: #1e5ea8; display: inline-block; }
      .timeline-list small { display: block; color: #4b5563; margin-top: 2px; }
      .notice-ok { margin-top: 10px; padding: 10px; border: 1px solid #8ad2a7; background: #e9faef; border-radius: 8px; }
      .notice-error { margin-top: 10px; padding: 10px; border: 1px solid #f3a2a2; background: #fff0f0; border-radius: 8px; }
      .cta { display:inline-block; margin-top:10px; padding: 8px 10px; background:#1e5ea8; color:#fff; border-radius:8px; text-decoration:none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
